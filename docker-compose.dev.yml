# Development stack — hot reload, no image rebuild for code changes.
# Usage: docker compose -f docker-compose.dev.yml up
#
# App URL: http://localhost:5173  (Vite dev server with HMR)
# API:     http://localhost:8000  (uvicorn --reload)

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: deliverymanager
      POSTGRES_PASSWORD: deliverymanager
      POSTGRES_DB: deliverymanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deliverymanager -d deliverymanager"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://deliverymanager:deliverymanager@postgres:5432/deliverymanager
    volumes:
      - ./backend/app:/app/app
      # Host path for local_project_directory (e.g. /var/www/html/myproject)
      - ${LOCAL_PROJECTS_HOST_PATH:-/var/www/html}:${LOCAL_PROJECTS_HOST_PATH:-/var/www/html}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
